# Updated: 2026-05-07T02:22:01.784Z
# Render 챕혘짢챌쩍짼챕혚혥챌쩍짰
# https://render.com/docs/deploy?-language=Python

services:
  - type: web
    name: foundapp-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    plan: free
    autoDeploy: true
    envVars:
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_BUCKET
        value: "found-app-2026"
      - key: OSS_ENDPOINT
        value: "oss-cn-beijing.aliyuncs.com"
      - key: TRTC_APP_ID
        value: "1600137968"
      - key: TRTC_APP_KEY
        sync: false
      - key: PORT
        value: "10000"
