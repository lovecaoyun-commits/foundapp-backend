services:
  - type: web
    name: foundapp-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TRTC_APP_ID
        value: "1600137968"
        sync: false
      - key: TRTC_APP_KEY
        sync: false
