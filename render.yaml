# Render 部署配置
# https://render.com/docs/deploy?-language=Python

services:
  - type: web
    name: foundapp-backend
    env: python
    pythonVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ping
    plan: free
    autoDeploy: false
    envVars:
      - key: OSS_ACCESS_KEY_ID
        value: "LTAI5t9Xzbgk8WhLsyWQJLCJ"
      - key: OSS_ACCESS_KEY_SECRET
        sync: false
      - key: OSS_BUCKET
        value: "found-app-2026"
      - key: OSS_ENDPOINT
        value: "oss-cn-beijing.aliyuncs.com"
      - key: TRTC_APP_ID
        value: "1600137968"
      - key: TRTC_APP_KEY
        sync: false
      - key: PORT
        value: "10000"

